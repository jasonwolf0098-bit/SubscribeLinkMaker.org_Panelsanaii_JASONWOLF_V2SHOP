name: Auto Config Updater Pro
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Execute Update Logic
        run: |
          python << 'EOF'
          import os
          from datetime import datetime

          CONFIG_FILE = "sinbox/configs.txt"
          MASTER_FILE = "satle/master.txt"
          USER_FILES = [f"mantle/user{i}.txt" for i in range(1, 8)]
          
          CUSTOM_NAME = "کانفیگ (ویژه نامحدود)"

          def log(msg):
              print(f">>> {msg}")

          def update_line_after_hash(original_line, new_content):
              # اگر علامت # در خط بود، متن قبل از آن را نگه می‌داریم
              if "#" in original_line:
                  prefix = original_line.split("#")[0]
                  return f"{prefix}#{new_content}\n"
              # اگر هشتگ نبود، کل خط را با محتوا جایگزین می‌کنیم (به عنوان زاپاس)
              return f"{new_content}\n"

          try:
              if not os.path.exists(CONFIG_FILE):
                  log(f"FAILED: {CONFIG_FILE} not found!")
                  exit(1)

              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  configs = [l.strip() for l in f if l.strip()]

              if not configs:
                  log("FAILED: configs.txt is empty!")
                  exit(1)

              # ۱. اصلاح نام کانفیگ اصلی (خط ۹)
              raw_config = configs[0]
              base_link = raw_config.split("#")[0] if "#" in raw_config else raw_config
              final_config = f"{base_link}#{CUSTOM_NAME}"

              # ۲. بروزرسانی فایل Master
              if not os.path.exists(MASTER_FILE):
                  log(f"Creating {MASTER_FILE}...")
                  os.makedirs("satle", exist_ok=True)
                  with open(MASTER_FILE, "w") as f: f.write("\n" * 60)

              with open(MASTER_FILE, "r", encoding="utf-8") as f:
                  m_lines = f.readlines()

              if len(m_lines) < 50:
                  m_lines.extend(["\n"] * (50 - len(m_lines)))

              # اعمال تغییرات با حفظ ساختار قبل از #
              # خط ۹ (ایندکس ۸): کل خط را با کانفیگ جدید عوض می‌کنیم (چون کلش لینک است)
              m_lines[8] = final_config + "\n"
              
              # خط ۴۴ (ایندکس ۴۳): فقط زمان بعد از #
              current_time = datetime.utcnow().strftime('%H:%M:%S') + " UTC"
              m_lines[43] = update_line_after_hash(m_lines[43], current_time)
              
              # خط ۴۶ (ایندکس ۴۵): فقط تاریخ بعد از #
              current_date = datetime.utcnow().strftime('%Y-%m-%d')
              m_lines[45] = update_line_after_hash(m_lines[45], current_date)

              with open(MASTER_FILE, "w", encoding="utf-8") as f:
                  f.writelines(m_lines)
              log("Master updated with hash-preservation logic.")

              # ۳. کپی به فایل‌های کاربران در پوشه mantle
              content_segment = m_lines[5:50]
              for u_path in USER_FILES:
                  if not os.path.exists(u_path):
                      os.makedirs("mantle", exist_ok=True)
                      with open(u_path, "w") as f: f.write("\n" * 60)
                  
                  with open(u_path, "r", encoding="utf-8") as f:
                      u_lines = f.readlines()
                  
                  if len(u_lines) < 50:
                      u_lines.extend(["\n"] * (50 - len(u_lines)))
                  
                  u_lines[5:50] = content_segment
                  with open(u_path, "w", encoding="utf-8") as f:
                      f.writelines(u_lines)
                  log(f"Updated: {u_path}")

          except Exception as e:
              log(f"CRITICAL ERROR: {str(e)}")
              exit(1)
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "AutoU

pdater-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Update with Hash-logic: $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
