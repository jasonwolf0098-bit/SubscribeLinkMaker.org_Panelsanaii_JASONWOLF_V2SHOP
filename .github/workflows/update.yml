name: Auto Config Updater

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Update Script
        run: |
          python << 'EOF'
          import os
          from datetime import datetime

          CONFIG_FILE="sinbox/configs.txt"
          MASTER_FILE="satle/master.txt"
          MANTLE_DIR="mantle"

          def replace_after_hash(line,text):
              if "#" in line:
                  prefix=line.split("#")[0]
                  return prefix+"#"+text+"\n"
              else:
                  return line.strip()+"#"+text+"\n"

          def update_after_hash(line,value):
              if "#" in line:
                  prefix=line.split("#")[0]
                  return prefix+"#"+value+"\n"
              return line

          if not os.path.exists(CONFIG_FILE):
              raise Exception("configs.txt not found")

          with open(CONFIG_FILE,"r",encoding="utf-8") as f:
              configs=[x.strip() for x in f.readlines()]

          if len(configs)<12:
              raise Exception("configs.txt needs at least 12 lines")

          labels=[
          "مخصوص مودم (مبینت ـ شاتل)",
          "مخصوص مودم (مبینت ـ های وب)",
          "مخصوص مودم (مبینت ـ مخابرات - آسیاتک )",
          "مخصوص مودم (مبینت - سایر شرکت ها)",

          "همراه اول (ویژه)",
          "همراه اول (کمکی سرور 1)",
          "همراه اول (کمکی سرور 2)",
          "همراه اول (کمکی سرور 3)",

          "ایرانسل (ویژه)",
          "ایرانسل (کمکی سرور 1)",
          "ایرانسل (کمکی سرور 2)",
          "ایرانسل (کمکی سرور 3)"
          ]

          fixed=[]
          for i in range(12):
              fixed.append(replace_after_hash(configs[i],labels[i]))

          os.makedirs("satle",exist_ok=True)

          if not os.path.exists(MASTER_FILE):
              with open(MASTER_FILE,"w") as f:
                  f.write("\n"*60)

          with open(MASTER_FILE,"r",encoding="utf-8") as f:
              master=f.readlines()

          if len(master)<60:
              master.extend(["\n"]*(60-len(master)))

          master[11:15]=fixed[0:4]
          master[23:27]=fixed[4:8]
          master[34:38]=fixed[8:12]

          now=datetime.utcnow()

          master[43]=update_after_hash(master[43],now.strftime("%H:%M:%S UTC"))
          master[45]=update_after_hash(master[45],now.strftime("%Y-%m-%d"))

          with open(MASTER_FILE,"w",encoding="utf-8") as f:
              f.writelines(master)

          os.makedirs(MANTLE_DIR,exist_ok=True)

          segment=master[5:50]

          txt_files=[f for f in os.listdir(MANTLE_DIR) if f.endswith(".txt")]

          for file in txt_files:

              path=os.path.join(MANTLE_DIR,file)

              with open(path,"r",encoding="utf-8") as f:
                  data=f.readlines()

              if len(data)<50:
                  data.extend(["\n"]*(50-len(data)))

              data[5:50]=segment

              with open(path,"w",encoding="utf-8") as f:
                  f.writelines(data)

              print("updated:",file)

          print("update finished")

          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "AutoUpdater"
          git config --global user.email "bot@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update $(date -u +"%Y-%m-%d %H:%M:%S")"
            git push
          fi
