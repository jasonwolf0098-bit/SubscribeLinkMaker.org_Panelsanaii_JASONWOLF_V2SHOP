name: Auto Config Updater Pro
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Execute Update Logic
        run: |
          python << 'EOF'
          import os
          from datetime import datetime

          CONFIG_FILE = "sinbox/configs.txt"
          MASTER_FILE = "satle/master.txt"
          USER_FILES = [f"mantle/user{i}.txt" for i in range(1, 8)]
          
          # نام مورد نظر شما برای نمایش در اپلیکیشن
          CUSTOM_NAME = "کانفیگ (ویژه نامحدود)"

          def log(msg):
              print(f">>> {msg}")

          try:
              if not os.path.exists(CONFIG_FILE):
                  log(f"FAILED: {CONFIG_FILE} not found!")
                  exit(1)

              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  configs = [l.strip() for l in f if l.strip()]

              if not configs:
                  log("FAILED: configs.txt is empty!")
                  exit(1)

              # انتخاب کانفیگ اول
              raw_config = configs[0]
              
              # --- بخش اصلاح نام کانفیگ ---
              # اگر علامت # وجود داشت، متن بعد از آن را حذف می‌کنیم
              if "#" in raw_config:
                  base_config = raw_config.split("#")[0]
              else:
                  base_config = raw_config
              
              # اضافه کردن نام جدید بعد از #
              final_config = f"{base_config}#{CUSTOM_NAME}"
              log(f"Config Renamed to: {final_config}")

              # بروزرسانی Master
              if not os.path.exists(MASTER_FILE):
                  os.makedirs("satle", exist_ok=True)
                  with open(MASTER_FILE, "w") as f: f.write("\n" * 60)

              with open(MASTER_FILE, "r", encoding="utf-8") as f:
                  m_lines = f.readlines()

              if len(m_lines) < 50:
                  m_lines.extend(["\n"] * (50 - len(m_lines)))

              # قرار دادن کانفیگ اصلاح شده در خط ۹ (ایندکس ۸)
              m_lines[8] = final_config + "\n"
              m_lines[43] = f"Update: {datetime.utcnow().strftime('%H:%M:%S')} UTC\n"
              m_lines[45] = f"Date: {datetime.utcnow().strftime('%Y-%m-%d')}\n"

              with open(MASTER_FILE, "w", encoding="utf-8") as f:
                  f.writelines(m_lines)

              # کپی به کاربران
              content_segment = m_lines[5:50]
              for u_path in USER_FILES:
                  if not os.path.exists(u_path):
                      os.makedirs("mantle", exist_ok=True)
                      with open(u_path, "w") as f: f.write("\n" * 60)
                  
                  with open(u_path, "r", encoding="utf-8") as f:
                      u_lines = f.readlines()
                  
                  if len(u_lines) < 50:
                      u_lines.extend(["\n"] * (50 - len(u_lines)))
                  
                  u_lines[5:50] = content_segment
                  with open(u_path, "w", encoding="utf-8") as f:
                      f.writelines(u_lines)
                  log(f"Updated: {u_path}")

              log("Process finished successfully.")

          except Exception as e:
              log(f"CRITICAL ERROR: {str(e)}")
              exit(1)
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "AutoUpdater-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Update Config Name & Sync: $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
