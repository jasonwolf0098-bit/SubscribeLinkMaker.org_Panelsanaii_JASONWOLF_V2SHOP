name: Auto Config Updater Pro

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Script
        run: |
          python << 'EOF'
          import os
          from datetime import datetime

          CONFIG_FILE = "sinbox/configs.txt"
          MASTER_FILE = "satle/master.txt"
          USER_FILES = [f"mantle/user{i}.txt" for i in range(1,8) "benyaminRZK.txt"]

          def replace_after_hash(line,new_text):
              if "#" in line:
                  prefix=line.split("#")[0]
                  return prefix+"#"+new_text+"\n"
              else:
                  return line.strip()+"#"+new_text+"\n"

          def update_hash_line(line,new_text):
              if "#" in line:
                  prefix=line.split("#")[0]
                  return prefix+"#"+new_text+"\n"
              return line

          if not os.path.exists(CONFIG_FILE):
              raise Exception("configs.txt not found")

          with open(CONFIG_FILE,"r",encoding="utf-8") as f:
              cfg=[x.strip() for x in f.readlines()]

          if len(cfg)<12:
              raise Exception("configs.txt must contain at least 12 lines")

          labels=[
          "مخصوص مودم (مبینت ـ شاتل)",
          "مخصوص مودم (مبینت ـ های وب)",
          "مخصوص مودم (مبینت ـ مخابرات - آسیاتک )",
          "مخصوص مودم (مبینت - سایر شرکت ها)",

          "همراه اول (ویژه)",
          "همراه اول (کمکی سرور 1)",
          "همراه اول (کمکی سرور 2)",
          "همراه اول (کمکی سرور 3)",

          "ایرانسل (ویژه)",
          "ایرانسل (کمکی سرور 1)",
          "ایرانسل (کمکی سرور 2)",
          "ایرانسل (کمکی سرور 3)"
          ]

          fixed=[]

          for i in range(12):
              fixed.append(replace_after_hash(cfg[i],labels[i]))

          if not os.path.exists(MASTER_FILE):
              os.makedirs("satle",exist_ok=True)
              with open(MASTER_FILE,"w") as f:
                  f.write("\n"*60)

          with open(MASTER_FILE,"r",encoding="utf-8") as f:
              master=f.readlines()

          if len(master)<60:
              master.extend(["\n"]*(60-len(master)))

          master[11:15]=fixed[0:4]
          master[23:27]=fixed[4:8]
          master[34:38]=fixed[8:12]

          now=datetime.utcnow()

          master[43]=update_hash_line(master[43],now.strftime("%H:%M:%S UTC"))
          master[45]=update_hash_line(master[45],now.strftime("%Y-%m-%d"))

          with open(MASTER_FILE,"w",encoding="utf-8") as f:
              f.writelines(master)

          segment=master[5:50]

          for u in USER_FILES:

              os.makedirs("mantle",exist_ok=True)

              if not os.path.exists(u):
                  with open(u,"w") as f:
                      f.write("\n"*60)

              with open(u,"r",encoding="utf-8") as f:
                  data=f.readlines()

              if len(data)<50:
                  data.extend(["\n"]*(50-len(data)))

              data[5:50]=segment

              with open(u,"w",encoding="utf-8") as f:
                  f.writelines(data)

          print("update finished")
          EOF

      - name: Commit
        run: |
          git config --global user.name "AutoUpdater"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "auto config update $(date -u +"%Y-%m-%d %H:%M")" || echo "no change"
          git push
