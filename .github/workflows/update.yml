name: Auto Config Updater

on:
  schedule:
    - cron: "0 * * * *" # هر یک ساعت اجرا می‌شود
  workflow_dispatch: # امکان اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run Update Script
        run: |
          python << 'EOF'
          import os
          from datetime import datetime
          import pytz

          # تعریف مسیرهای دقیق بر اساس ساختار پوشه‌بندی شما
          CONFIG_SOURCE = "utral/abortingpass/sinbox/configs.txt"
          MASTER_FILE = "utral/abortingpass/satle/master.txt"
          USER_FILES = [f"utral/abortingpass/mantle/user{i}.txt" for i in range(1, 7)] # از user1 تا user6

          def ensure_file_lines(lines, min_lines):
              if len(lines) < min_lines:
                  lines.extend(["\n"] * (min_lines - len(lines)))
              return lines

          try:
              # ۱. خواندن کانفیگ‌های جدید (خط اول را به عنوان نمونه برمی‌داریم)
              if not os.path.exists(CONFIG_SOURCE):
                  print(f"Error: {CONFIG_SOURCE} not found!")
                  exit(1)
              
              with open(CONFIG_SOURCE, "r", encoding="utf-8") as f:
                  configs = [line.strip() for line in f if line.strip()]
              
              if not configs:
                  print("Error: configs.txt is empty!")
                  exit(1)
              
              # انتخاب اولین کانفیگ (در آینده می‌توان منطق Multi-node را اینجا گذاشت)
              new_config = configs[0]

              # ۲. بروزرسانی فایل Master
              if not os.path.exists(MASTER_FILE):
                  print(f"Error: {MASTER_FILE} not found!")
                  exit(1)

              with open(MASTER_FILE, "r", encoding="utf-8") as f:
                  master_lines = f.readlines()

              # اطمینان از وجود حداقل ۴۶ خط
              master_lines = ensure_file_lines(master_lines, 47)

              # اعمال تغییرات در خطوط مشخص شده (ایندکس پایتون از 0 شروع می‌شود)
              # خط ۹ (ایندکس ۸)، خط ۴۴ (ایندکس ۴۳)، خط ۴۶ (ایندکس ۴۵)
              master_lines[8] = new_config + "\n"
              
              tehran_tz = pytz.timezone('Asia/Tehran')
              now = datetime.now(tehran_tz)
              master_lines[43] = f"Last Update: {now.strftime('%H:%M:%S')}\n"
              master_lines[45] = f"Date: {now.strftime('%Y-%m-%d')}\n"

              with open(MASTER_FILE, "w", encoding="utf-8") as f:
                  f.writelines(master_lines)

              # ۳. کپی کردن قطعه (خط ۶ تا ۵۰) به فایل‌های کاربران
              # ایندکس ۵ تا ۵۰ در پایتون
              segment = master_lines[5:50]

              for user_path in USER_FILES:
                  if os.path.exists(user_path):
                      with open(user_path, "r", encoding="utf-8") as f:
                          u_lines = f.readlines()
                      
                      u_lines = ensure_file_lines(u_lines, 50)
                      u_lines[5:50] = segment
                      
                      with open(user_path, "w", encoding="utf-8") as f:
                          f.writelines(u_lines)
                      print(f"Updated: {user_path}")
                  else:
                      print(f"Warning: {user_path} not found, skipping.")

              print("All updates applied successfully.")

          except Exception as e:
              print(f"An error occurred: {e}")
              exit(1)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Github Action Bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Automated update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
