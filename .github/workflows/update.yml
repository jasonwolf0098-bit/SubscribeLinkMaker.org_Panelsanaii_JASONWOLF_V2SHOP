name: Auto Config Updater Pro
on:
  schedule:
    - cron: "0 * * * *" # هر ساعت یکبار
  workflow_dispatch: # اجرای دستی برای تست

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Execute Update Logic
        run: |
          python << 'EOF'
          import os
          from datetime import datetime

          # --- تنظیم دقیق آدرس‌ها بر اساس اسکرین‌شات شما ---
          CONFIG_FILE = "sinbox/configs.txt"
          MASTER_FILE = "satle/master.txt"
          # لیست کاربران از ۱ تا ۷
          USER_FILES = [f"mantle/user{i}.txt" for i in range(1, 8)]

          def log(msg):
              print(f">>> {msg}")

          try:
              # ۱. بررسی وجود فایل منبع کانفیگ
              if not os.path.exists(CONFIG_FILE):
                  log(f"FAILED: {CONFIG_FILE} not found!")
                  exit(1)

              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  configs = [l.strip() for l in f if l.strip()]

              if not configs:
                  log("FAILED: configs.txt is empty!")
                  exit(1)

              # انتخاب اولین کانفیگ موجود (بعدا می‌توان Multi-node کرد)
              new_link = configs[0]
              log(f"Selected Config: {new_link[:40]}...")

              # ۲. بروزرسانی فایل Master در پوشه satle
              if not os.path.exists(MASTER_FILE):
                  log(f"Warning: {MASTER_FILE} missing, creating it...")
                  os.makedirs("satle", exist_ok=True)
                  with open(MASTER_FILE, "w") as f: f.write("\n" * 60)

              with open(MASTER_FILE, "r", encoding="utf-8") as f:
                  m_lines = f.readlines()

              # اطمینان از طول فایل (حداقل ۵۰ خط)
              if len(m_lines) < 50:
                  m_lines.extend(["\n"] * (50 - len(m_lines)))

              # اعمال تغییرات (خط ۹، ۴۴، ۴۶)
              m_lines[8] = new_link + "\n"
              m_lines[43] = f"Update: {datetime.utcnow().strftime('%H:%M:%S')} UTC\n"
              m_lines[45] = f"Date: {datetime.utcnow().strftime('%Y-%m-%d')}\n"

              with open(MASTER_FILE, "w", encoding="utf-8") as f:
                  f.writelines(m_lines)
              log("Master file updated successfully.")

              # ۳. انتقال قطعه خطوط ۶ تا ۵۰ به کاربران در پوشه mantle
              content_segment = m_lines[5:50]

              for u_path in USER_FILES:
                  if not os.path.exists(u_path):
                      log(f"Creating missing user file: {u_path}")
                      os.makedirs("mantle", exist_ok=True)
                      with open(u_path, "w") as f: f.write("\n" * 60)
                  
                  with open(u_path, "r", encoding="utf-8") as f:
                      u_lines = f.readlines()
                  
                  if len(u_lines) < 50:
                      u_lines.extend(["\n"] * (50 - len(u_lines)))
                  
                  # جایگذاری بخش اصلی
                  u_lines[5:50] = content_segment
                  
                  with open(u_path, "w", encoding="utf-8") as f:
                      f.writelines(u_lines)
                  log(f"Updated: {u_path}")

              log("All tasks completed.")

          except Exception as e:
              log(f"CRITICAL ERROR: {str(e)}")
              exit(1)
          EOF

      - name: Commit Changes
        run: |
          git config --global user.name "AutoUpdater-Bot"
          git config --global user.email "bot@github.com"
          git add .
          # جلوگیری از خطا در صورتی که تغییری وجود نداشته باشد
          git commit -m "Sync: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || echo "No changes to commit"
          git push
